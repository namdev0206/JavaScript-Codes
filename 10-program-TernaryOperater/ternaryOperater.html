<html>
    <head>
        <script>

            //Ternary Operator
            let age = 20;
            let message = "";

            age>18?console.log("You are an Adult"):("You are a Minor");

            message= age>18?"you are adult":"you are minor"
            console.log(message);


            let score = 79;
            grade=score>80?"A":score>60?"B":score>40?"C":score>30?"D":"Fail";
            console.log(grade);
        </script>
    </head>

    <body>
        <h1>Ternary Operators in JavaScript</h1>
    </body>
</html>

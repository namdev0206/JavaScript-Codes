<html>
    <head>
        <script>
            function operations()
            {
                // = Assignment Operator
                let a=10;

                let b=5;

                // += Add & Assign Operator
                a+=b;
                console.log(a);
            }
        </script>
    </head>

    <body>
        <h1>Assignment Operators</h1>

        <button onclick="operations()">Click Here</button>
    </body>
</html>

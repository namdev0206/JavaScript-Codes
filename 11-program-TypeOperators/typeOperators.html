<html>
    <head>
        <script>

            //typeof Operator = Which type of data is in Variable
            let data = "Namdev";
            let dataType = typeof data;
            console.log(dataType);
            
            //in Operator can check the Key Data
            let data1 = {name:'Namdev', age:25, email:"namdevpanchal123@gmail.com"};
            console.log("name" in data1);

            
            //instanceof Operator
            let info=[];
            // info = new Date();
            console.log(info instanceof Array);
            console.log(info instanceof Date);
            
        </script>
    </head>

    <body>
        <h1>Type Operators in JS</h1>
    </body>
</html>

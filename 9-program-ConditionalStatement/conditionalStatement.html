<html>
    <head>
        <script>

            //If Statement
            let age = 17;
            if(age >= 18)
            {
                console.log("As you are " + age + "you can vote");
            }
            else
            {
                console.log("As you are " + age + " you can not vote");
            }

            //Else if Statement
            const marks = 85;
            if(marks > 85)
            {
                console.log("Grade A");
            }
            else if(marks > 60 && marks < 85)
            {
                console.log("Grade B"); 
            }
            else if(marks > 45 && marks < 60)
            {
                console.log("Grade C");
            }
            else
            {
                console.log("Grade D");
            }


            //Switch Statement
            let day = 2;
            switch(day)
            {
                case 1: 
                console.log("Monday");
                break;

                case 2: 
                console.log("Tuesday");
                break;

                case 3: 
                console.log("Wednesday");
                break;

                case 4: 
                console.log("Thursday");
                break;

                case 5: 
                console.log("Friday");
                break;

                case 6: 
                console.log("Saturday");
                break;

                case 7: 
                console.log("Sunday");
                break;

                default:
                    console.log("Wrong Input");
            }
            
        </script>
    </head>

    <body>
        <h1>Conditional Statement in JS</h1>
    </body>
</html>

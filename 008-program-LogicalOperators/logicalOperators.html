<html>
    <head>
        <script>
            let name="Namdev";
            let age=29;

            //console.log(name=="Namdev" && age==29);
            
            if(name=='Namdev' && age==29)
                {
                    console.log("Write your code here");
                }

            if(name=='Namdev' || age==30)
                 {
                     console.log("Or Logical Operator");
                 }

            console.log(!age);

            
            name &&=age;
            console.log(name);
        </script>
    </head>

    <body>
        <h1>Logical Operator</h1>
    </body>
</html>
